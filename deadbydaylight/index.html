<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/deadbydaylight/assets/img/deadbydaylight_icon.png" />

<meta name="description" content="DBD Requests — killers and challenges viewers can request on stream." />
<meta property="og:title" content="DBD Requests • Sic4rioDragon" />
<meta property="og:description" content="Requestable killers + challenges for stream." />
<meta property="og:image" content="https://sic4riodragon.uk/deadbydaylight/assets/img/banner1_discord_1200x630.png" />

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sic4rioDragon — DBD Requests</title>

  <link rel="stylesheet" href="/deadbydaylight/style.css" />
  <link rel="stylesheet" href="./dbd.css" />
</head>
<body>
  <div class="pageWrap">

    <header class="topHeader">
      <a class="backBtn" href="../">← Back to Twitch</a>

      <div class="titleWrap">
        <h1 class="pageTitle">DBD Requests</h1>
        <p class="pageSub">Killers viewers can request (disabled = unowned or not supported)</p>
      </div>

      <div class="headerActions">
        <input id="searchInput" class="searchBox" placeholder="Search killers..." />
      </div>
    </header>

    <main>
  <!-- Challenges FIRST -->
  <section class="challengeSection" aria-label="DBD Challenges">
    <div class="challengeHeader">
      <h2 class="challengeTitle">Challenges</h2>

      <div class="challengeLinks">
        <a id="nightlightLink" class="pillBtn" href="https://nightlight.gg/buildchallenge" target="_blank" rel="noopener">
          Open NightLight Build Challenge
        </a>
        <a id="suggestgoogleform" class="pillBtn" href="https://docs.google.com/forms/d/1IVhKiRns1qImgMMl4pyedQvLpTkeBuid-Y4etRanLXQ" target="_blank" rel="noopener">
          Suggest a challenge
        </a>
      </div>
    </div>

    <div id="challengeList" class="challengeList"></div>

  </section>

  <div id="killer-grid" aria-label="DBD Requestable Killers"></div>
  </main>
  <div class="titleblock dbd-nav-bottom">
  <div class="title-row">

    <a class="title-avatar-link"
       href="/deadbydaylight/survivors.html"
       title="View my survivor prestiges">
      <img class="title-avatar"
           src="/deadbydaylight/assets/img/yui.png"
           alt="Yui">
    </a>

    <div class="title-text">
      <h2>Prestige Tracker</h2>
      <p>Click Yui or Huntress to open my full prestige trackers.</p>
    </div>

    <a class="title-avatar-link"
       href="/deadbydaylight/"
       title="View my killer prestiges">
      <img class="title-avatar"
           src="/deadbydaylight/assets/img/huntress.png"
           alt="Huntress">
    </a>

  </div>
</div>
    <footer class="siteFooter">
      <div class="footerLeft">© Sic4rioDragon</div>
      <div class="footerRight">
        <a href="https://www.twitch.tv/Sic4rioDragon" target="_blank" rel="noopener">Twitch</a>

    </footer>

  </div>
